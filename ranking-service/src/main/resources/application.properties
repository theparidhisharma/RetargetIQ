server:
  port: 3006

retrieval-service:
  url: http://retrieval-service:3005

feature-store-service:
  url: http://feature-store-service:3004


server.address=0.0.0.0

# Prometheus Metrics Exposure
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Logging
logging.level.root=INFO
logging.level.com.retargetiq=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n [%X{correlationId}]

spring.application.name=ranking-service
server.port=8087

management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.export.prometheus.enabled=true
logging.level.com.retargetiq=DEBUG
spring.application.name=<SERVICE_NAME>