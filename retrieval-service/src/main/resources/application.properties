server:
  port: 3005

spring:
  application:
    name: retrieval-service

# Feature store endpoint (defaults to docker-compose service name)
feature:
  store:
    url: ${FEATURE_STORE_URL:http://feature-store-service:3004}
logging:
  level:
    root: INFO
    com.retarget.retrieval: DEBUG

server.address=0.0.0.0
# Prometheus Metrics Exposure
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Logging
logging.level.root=INFO
logging.level.com.retargetiq=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n [%X{correlationId}]
