server.port=${SERVER_PORT:8085}
server.address=0.0.0.0

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/retargetdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:retarget}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:retarget}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.redis.host=${REDIS_HOST:redis}
spring.redis.port=${REDIS_PORT:6379}

featurestore.kafka.user-topic=${FEATURESTORE_KAFKA_USER_TOPIC:user-events}
featurestore.kafka.order-topic=${FEATURESTORE_KAFKA_ORDER_TOPIC:order-events}

management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

logging.level.root=INFO
logging.level.com.retargetiq=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n [%X{correlationId}]